name: CD

on:
  pull_request:
    types:
    - closed

jobs:
  tag_build:
    uses: tnoff/github-workflows/.github/workflows/tag.yml@ace23270fbc86eea0152c1cd2b186a03d9839072
    with:
      version_file: ./VERSION
  check_labels:
    uses: tnoff/github-workflows/.github/workflows/check-pr-labels.yml@3cc45e806b8343c4bb8ce1dfa68981bafa3d84ba
    with:
      required_labels: 'build-docker'
      require_all_labels: true
      require_merged: true
  build:
    needs: check_labels
    if: needs.check_labels.outputs.conditions_met == 'true'
    uses: tnoff/github-workflows/.github/workflows/ocir-push.yml@c3a2dbfa7121104454456322e923ba9f6ac7ffeb
    with:
      image_name: ${{ vars.OCI_REPO_NAME }}
      platforms: linux/arm64
    secrets:
      oci_registry: ${{ secrets.OCI_REGISTRY }}
      oci_username: ${{ secrets.OCI_USERNAME }}
      oci_token: ${{ secrets.OCI_TOKEN }}
      oci_namespace: ${{ secrets.OCI_NAMESPACE }}
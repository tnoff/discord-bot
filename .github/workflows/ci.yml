name: CI

on:
  - pull_request

jobs:
  actions:
    uses: tnoff/github-workflows/.github/workflows/check-action-pins.yml@5c01c5cfcd5237914aee049f8b681b1a0b6215cc
  coverage:
    uses: tnoff/github-workflows/.github/workflows/coverage-check.yml@5c01c5cfcd5237914aee049f8b681b1a0b6215cc
    permissions:
      contents: read
      actions: read
    with:
      coverage_source: discord_bot
      install_command: pip install ".[all,test,sqlite]"
      python_version: 3.14
      pre_install_command: sudo apt-get update && sudo apt-get install -y sqlite3 ffmpeg
  build:
    name: Tox
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13', '3.14']
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ matrix.python-version }}
    - id: setup-sqlite3
      run: sudo apt-get update && sudo apt-get install -y sqlite3 ffmpeg
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install tox tox-gh-actions
    - name: Test with tox
      run: tox -v
  docker:
    name: Docker Build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
    - name: Build bot image (sqlite)
      uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
      with:
        context: .
        file: ./docker/Dockerfile
        push: false
        build-args: DB_TYPE=sqlite
    - name: Build bot image (postgres)
      uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
      with:
        context: .
        file: ./docker/Dockerfile
        push: false
        build-args: DB_TYPE=postgres
    - name: Build bot image (HA)
      uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
      with:
        context: .
        file: ./docker/Dockerfile.bot
        push: false
    - name: Build dispatcher image
      uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
      with:
        context: .
        file: ./docker/Dockerfile.dispatcher
        push: false

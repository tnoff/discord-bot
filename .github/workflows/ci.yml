name: CI

on:
  - pull_request

jobs:
  actions:
    uses: tnoff/github-workflows/.github/workflows/check-action-pins.yml@64405b1b33a7b6881ee07164018782dc21830dad
  coverage:
    uses: tnoff/github-workflows/.github/workflows/coverage-check.yml@ace23270fbc86eea0152c1cd2b186a03d9839072
    permissions:
      contents: read
      actions: read
    with:
      coverage_source: discord_bot
      install_command: pip install -r requirements.txt -r tests/requirements.txt
      python_version: 3.14
      pre_install_command: sudo apt-get update && sudo apt-get install -y ffmpeg
  build:
    name: Tox
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13', '3.14']
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ matrix.python-version }}
    - id: setup-ffmpeg
      run: sudo apt-get update && sudo apt-get install -y ffmpeg
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install tox tox-gh-actions
    - name: Test with tox
      run: tox -v
  docker:
    name: Docker Build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
    - name: Build image
      uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
      with:
        push: false

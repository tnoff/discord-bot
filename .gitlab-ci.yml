include:
  - project: 'tnoff-projects/github-workflows'
    ref: b008ef774ea959a0a2b291f7a3eb6716ed05a5ff
    file: '/gitlab/tag.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: b008ef774ea959a0a2b291f7a3eb6716ed05a5ff
    file: '/gitlab/discord-notify.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: b008ef774ea959a0a2b291f7a3eb6716ed05a5ff
    file: '/gitlab/renovate.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: b008ef774ea959a0a2b291f7a3eb6716ed05a5ff
    file: '/gitlab/bump-version.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: b008ef774ea959a0a2b291f7a3eb6716ed05a5ff
    file: '/gitlab/trufflehog.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: b008ef774ea959a0a2b291f7a3eb6716ed05a5ff
    file: '/gitlab/trufflehog-image.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: b008ef774ea959a0a2b291f7a3eb6716ed05a5ff
    file: '/gitlab/trigger-bump.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: b008ef774ea959a0a2b291f7a3eb6716ed05a5ff
    file: '/gitlab/buildkit-build-check.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: b008ef774ea959a0a2b291f7a3eb6716ed05a5ff
    file: '/gitlab/buildkit-docker-push.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: b008ef774ea959a0a2b291f7a3eb6716ed05a5ff
    file: '/gitlab/tox-pipeline.yml'

default:
  tags:
    - self-hosted

stages:
  - validate
  - test
  - tag
  - build
  - notify
  - renovate

# Shared rules for the image-build + image-scan jobs. On MRs that don't touch
# anything baked into the image (the docker/ context, python source, deps, or
# version), skip these jobs — they take ~10–17 min combined and otherwise burn
# runner slots needed by the tox matrix. Cosmetic MRs (github-workflows ref
# bumps, README/doc-only edits, renovate.json tweaks) get fast pipelines.
# Fork MRs keep the manual gate; default-branch builds always run.
.image-build-rules:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_PROJECT_ID != $CI_PROJECT_ID
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - discord_bot/**/*
        - alembic/**/*
        - alembic.ini
        - docker/**/*
        - pyproject.toml
        - VERSION
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"

bump-version:
  extends: .bump-version
  variables:
    GITLAB_PUSH_TOKEN: $RENOVATE_TOKEN
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME =~ /^renovate\/dev-/

trufflehog:
  extends: .trufflehog
  stage: validate
  rules:
    # Fork MRs require a project member to manually trigger jobs — prevents untrusted code from running CI automatically
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_PROJECT_ID != $CI_PROJECT_ID
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

docker-build-bot:
  extends: .buildkit-build-check
  variables:
    DOCKERFILE_DIR: docker
    OUTPUT_NAME: discord-bot:ci
    OUTPUT_TARBALL: image-bot.tar
  rules: !reference [.image-build-rules, rules]

docker-build-dispatcher:
  extends: .buildkit-build-check
  variables:
    DOCKERFILE_DIR: docker
    DOCKERFILE_NAME: Dockerfile.dispatcher
    OUTPUT_NAME: discord-dispatcher:ci
    OUTPUT_TARBALL: image-dispatcher.tar
  rules: !reference [.image-build-rules, rules]

trufflehog-bot-image:
  extends: .trufflehog-image
  stage: validate
  needs: [docker-build-bot]
  variables:
    TRUFFLEHOG_IMAGE_TARBALL: image-bot.tar
  rules: !reference [.image-build-rules, rules]

trufflehog-dispatcher-image:
  extends: .trufflehog-image
  stage: validate
  needs: [docker-build-dispatcher]
  variables:
    TRUFFLEHOG_IMAGE_TARBALL: image-dispatcher.tar
  rules: !reference [.image-build-rules, rules]

tox-generate:
  extends: .tox-generate
  variables:
    # Pre-baked CI base image (ci-base-images:3.X) ships git + ffmpeg +
    # postgresql-client. ${CI_BASE_IMAGE_PATH} is the group-level plaintext
    # var provisioned in terraform/infra/gitlab.tf and is expanded here at
    # parent-pipeline time. $$ escapes the second dollar so ${PYTHON_VERSION}
    # reaches tox-generate's heredoc literally; the child pipeline's
    # parallel: matrix: then substitutes it per Python minor at runtime.
    TOX_BASE_IMAGE: '${CI_BASE_IMAGE_PATH}:$${PYTHON_VERSION}'

tox-pipeline:
  extends: .tox-pipeline

tag-build:
  extends: .tag
  stage: tag
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"
      when: on_success

docker-push-bot:
  extends: .buildkit-docker-push
  variables:
    DOCKERFILE_DIR: docker

# Producer side of the docker-apps image-pin bump flow.
# Only wired to docker-push-bot — the dispatcher/bot-min/broker images
# aren't currently consumed by docker-apps.
# Rewrites the pin in apps/discord/discord-app.yaml on merge to main.
# See github-workflows/gitlab/trigger-bump.yml for the template details.
trigger-bump-docker-apps:
  extends: .trigger-bump
  needs:
    - job: docker-push-bot
      artifacts: true
  variables:
    BUMP_SOURCE: 'discord-bot'

# OCI_REPO_NAME_64 is set per-image via shell-export in before_script rather
# than the YAML-level `OCI_REPO_NAME_64: $OCI_DISPATCHER_REPO_NAME_64` form,
# because GitLab does not reliably substitute when both vars are masked CI
# variables — the override silently no-ops and OCI_REPO_NAME_64 falls back to
# the project default (the bot repo), so the dispatcher image gets pushed to
# discord_bot:<sha>, racing the docker-push-bot tag. Shell expansion of
# $OCI_DISPATCHER_REPO_NAME_64 from env always works since the masked value is
# injected normally.
docker-push-dispatcher:
  extends: .buildkit-docker-push
  variables:
    DOCKERFILE_DIR: docker
    DOCKERFILE_NAME: Dockerfile.dispatcher
  before_script:
    - export OCI_REPO_NAME_64="$OCI_DISPATCHER_REPO_NAME_64"
    - !reference [.buildkit-docker-push, before_script]

notify-mr:
  extends: .discord-notify
  stage: notify
  needs: []
  variables:
    NOTIFY_TYPE: mr_opened
    DISCORD_WEBHOOK_URL: $DISCORD_MR_WEBHOOK
  rules:
    # Fork MRs require a project member to manually trigger jobs — prevents untrusted code from running CI automatically
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_PROJECT_ID != $CI_PROJECT_ID
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: always

notify-failure:
  extends: .discord-notify
  stage: notify
  needs: [tag-build, docker-push-bot, docker-push-dispatcher, trigger-bump-docker-apps]
  variables:
    NOTIFY_TYPE: failure
    DISCORD_WEBHOOK_URL: $DISCORD_BUILD_FAILURE_WEBHOOK
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"
      when: on_failure

notify-renovate-failure:
  extends: .discord-notify
  stage: renovate
  needs: [renovate]
  variables:
    NOTIFY_TYPE: failure
    DISCORD_WEBHOOK_URL: $DISCORD_BUILD_FAILURE_WEBHOOK
    NOTIFY_MESSAGE: 'Renovate failed'
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: on_failure

notify-merged:
  extends: .discord-notify
  stage: notify
  needs: []
  variables:
    NOTIFY_TYPE: mr_merged
    DISCORD_WEBHOOK_URL: $DISCORD_MR_WEBHOOK
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"
      when: always

renovate:
  extends: .renovate
  stage: renovate
  variables:
    GITHUB_COM_TOKEN: $GITHUB_BOT_TOKEN
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"

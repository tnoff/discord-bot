include:
  - project: 'tnoff-projects/github-workflows'
    ref: f94e713c3714277de4d131d29b9c4af9ab3ef10d
    file: '/gitlab/tag.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: f94e713c3714277de4d131d29b9c4af9ab3ef10d
    file: '/gitlab/discord-notify.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: f94e713c3714277de4d131d29b9c4af9ab3ef10d
    file: '/gitlab/renovate.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: f94e713c3714277de4d131d29b9c4af9ab3ef10d
    file: '/gitlab/bump-version.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: f94e713c3714277de4d131d29b9c4af9ab3ef10d
    file: '/gitlab/trufflehog.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: f94e713c3714277de4d131d29b9c4af9ab3ef10d
    file: '/gitlab/trufflehog-image.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: f94e713c3714277de4d131d29b9c4af9ab3ef10d
    file: '/gitlab/trigger-bump.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: f94e713c3714277de4d131d29b9c4af9ab3ef10d
    file: '/gitlab/buildkit-build-check.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: f94e713c3714277de4d131d29b9c4af9ab3ef10d
    file: '/gitlab/buildkit-docker-push.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: f94e713c3714277de4d131d29b9c4af9ab3ef10d
    file: '/gitlab/tox-pipeline.yml'

default:
  tags:
    - self-hosted

stages:
  - validate
  - test
  - tag
  - build
  - notify
  - renovate

bump-version:
  extends: .bump-version
  variables:
    GITLAB_PUSH_TOKEN: $RENOVATE_TOKEN
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME =~ /^renovate\/dev-/

trufflehog:
  extends: .trufflehog
  stage: validate
  rules:
    # Fork MRs require a project member to manually trigger jobs — prevents untrusted code from running CI automatically
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_PROJECT_ID != $CI_PROJECT_ID
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

docker-build-bot-sqlite:
  extends: .buildkit-build-check
  variables:
    DOCKERFILE_DIR: docker
    BUILD_ARGS: '--opt build-arg:DB_TYPE=sqlite'
    OUTPUT_NAME: discord-bot:ci-sqlite
    OUTPUT_TARBALL: image-bot-sqlite.tar

docker-build-bot-postgres:
  extends: .buildkit-build-check
  variables:
    DOCKERFILE_DIR: docker
    BUILD_ARGS: '--opt build-arg:DB_TYPE=postgres'
    OUTPUT_NAME: discord-bot:ci-postgres
    OUTPUT_TARBALL: image-bot-postgres.tar

docker-build-dispatcher:
  extends: .buildkit-build-check
  variables:
    DOCKERFILE_DIR: docker
    DOCKERFILE_NAME: Dockerfile.dispatcher
    OUTPUT_NAME: discord-dispatcher:ci
    OUTPUT_TARBALL: image-dispatcher.tar

trufflehog-bot-image:
  extends: .trufflehog-image
  stage: validate
  needs: [docker-build-bot-sqlite]
  variables:
    TRUFFLEHOG_IMAGE_TARBALL: image-bot-sqlite.tar
  rules:
    # Fork MRs require a project member to manually trigger jobs — prevents untrusted code from running CI automatically
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_PROJECT_ID != $CI_PROJECT_ID
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

trufflehog-dispatcher-image:
  extends: .trufflehog-image
  stage: validate
  needs: [docker-build-dispatcher]
  variables:
    TRUFFLEHOG_IMAGE_TARBALL: image-dispatcher.tar
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_PROJECT_ID != $CI_PROJECT_ID
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

tox-generate:
  extends: .tox-generate
  variables:
    TOX_EXTRA_APT: 'sqlite3 ffmpeg'

tox-pipeline:
  extends: .tox-pipeline

tag-build:
  extends: .tag
  stage: tag
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"
      when: on_success

docker-push-bot:
  extends: .buildkit-docker-push
  variables:
    DOCKERFILE_DIR: docker
    BUILD_ARGS: '--opt build-arg:DB_TYPE=sqlite'

# Producer side of the docker-apps image-pin bump flow.
# Only wired to docker-push-bot — the dispatcher/bot-min/broker images
# aren't currently consumed by docker-apps.
# Rewrites the pin in apps/discord/discord-app.yaml on merge to main.
# See github-workflows/gitlab/trigger-bump.yml for the template details.
trigger-bump-docker-apps:
  extends: .trigger-bump
  needs:
    - job: docker-push-bot
      artifacts: true
  variables:
    BUMP_SOURCE: 'discord-bot'

docker-push-dispatcher:
  extends: .buildkit-docker-push
  variables:
    DOCKERFILE_DIR: docker
    DOCKERFILE_NAME: Dockerfile.dispatcher
    OCI_REPO_NAME_64: $OCI_DISPATCHER_REPO_NAME_64

notify-mr:
  extends: .discord-notify
  stage: notify
  needs: []
  variables:
    NOTIFY_TYPE: mr_opened
    DISCORD_WEBHOOK_URL: $DISCORD_MR_WEBHOOK
  rules:
    # Fork MRs require a project member to manually trigger jobs — prevents untrusted code from running CI automatically
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_PROJECT_ID != $CI_PROJECT_ID
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: always

notify-failure:
  extends: .discord-notify
  stage: notify
  needs: [tag-build, docker-push-bot, docker-push-dispatcher, trigger-bump-docker-apps]
  variables:
    NOTIFY_TYPE: failure
    DISCORD_WEBHOOK_URL: $DISCORD_BUILD_FAILURE_WEBHOOK
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"
      when: on_failure

notify-renovate-failure:
  extends: .discord-notify
  stage: renovate
  needs: [renovate]
  variables:
    NOTIFY_TYPE: failure
    DISCORD_WEBHOOK_URL: $DISCORD_BUILD_FAILURE_WEBHOOK
    NOTIFY_MESSAGE: 'Renovate failed'
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: on_failure

notify-merged:
  extends: .discord-notify
  stage: notify
  needs: []
  variables:
    NOTIFY_TYPE: mr_merged
    DISCORD_WEBHOOK_URL: $DISCORD_MR_WEBHOOK
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"
      when: always

renovate:
  extends: .renovate
  stage: renovate
  variables:
    GITHUB_COM_TOKEN: $GITHUB_BOT_TOKEN
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"

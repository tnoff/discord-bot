services:
  redis:
    image: redis:7-alpine
    volumes:
      - ../volumes/redis:/data
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: discord
      POSTGRES_PASSWORD: discord
      POSTGRES_DB: discord
    volumes:
      - ../volumes/postgres:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U discord -d discord"]
      interval: 5s
      timeout: 5s
      retries: 5

  dispatcher:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dispatcher
    volumes:
      - ../volumes/cnf/discord.dispatcher.cnf:/opt/discord/cnf/discord.cnf:ro
      - ../volumes/db:/opt/discord/db
      - ../volumes/dispatcher-logs:/var/log/discord
    depends_on:
      - redis
    restart: unless-stopped

  bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      - ../volumes/cnf/discord.bot.cnf:/opt/discord/cnf/discord.cnf:ro
      - ../volumes/db:/opt/discord/db
      - ../volumes/bot-logs:/var/log/discord
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_started
      dispatcher:
        condition: service_started
      postgres:
        condition: service_healthy
    restart: unless-stopped
